<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop - Find Your Best Crop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="farm-background">
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/" class="nav-link">Home</a>
        <a href="/about" class="nav-link">About</a>
        <a href="/findyourcrop" class="nav-link active">FindYourCrop</a>
    </nav>

    <!-- Background with overlay -->
    <div class="background-overlay"></div>

    <div class="page-container">
        <!-- Header Banner -->
        <div class="banner">
            <h1 class="banner-title">Find Your Best Crop Here</h1>
            <p class="banner-subtitle">Please enter the conditions</p>
        </div>

        <!-- Main Content Card -->
        <div class="main-card">
            <!-- Form Section -->
            <form id="predictionForm" class="prediction-form">
                <div class="form-grid">
                    <!-- Nitrogen -->
                    <div class="input-field">
                        <label for="N">Nitrogen</label>
                        <input type="number" id="N" placeholder="Enter nitrogen value" min="0" max="250" step="0.1" required>
                    </div>

                    <!-- Phosphorus -->
                    <div class="input-field">
                        <label for="P">Phosphorus</label>
                        <input type="number" id="P" placeholder="Enter phosphorus value" min="0" max="250" step="0.1" required>
                    </div>

                    <!-- Potassium -->
                    <div class="input-field">
                        <label for="K">Potassium</label>
                        <input type="number" id="K" placeholder="Enter potassium value" min="0" max="300" step="0.1" required>
                    </div>

                    <!-- Temperature -->
                    <div class="input-field">
                        <label for="temperature">Temperature</label>
                        <input type="number" id="temperature" placeholder="Enter temperature (°C)" min="-10" max="60" step="0.1" required>
                    </div>

                    <!-- Humidity -->
                    <div class="input-field">
                        <label for="humidity">Humidity</label>
                        <input type="number" id="humidity" placeholder="Enter humidity (%)" min="0" max="100" step="0.1" required>
                    </div>

                    <!-- pH -->
                    <div class="input-field">
                        <label for="ph">pH</label>
                        <input type="number" id="ph" placeholder="Enter pH value" min="0" max="14" step="0.1" required>
                    </div>

                    <!-- Rainfall -->
                    <div class="input-field">
                        <label for="rainfall">Rainfall</label>
                        <input type="number" id="rainfall" placeholder="Enter rainfall (mm)" min="0" max="1000" step="0.1" required>
                    </div>
                </div>

                <button type="submit" class="btn-predict">Predict</button>
            </form>

            <!-- Result Section -->
            <div id="resultContainer" class="result-container hidden">
                <div id="resultCard" class="result-card">
                    <p class="result-label">Best crop for given conditions is</p>
                    <h2 id="cropName" class="crop-name">-</h2>
                </div>

                <div id="errorCard" class="error-card hidden">
                    <p class="error-label">⚠️ Error</p>
                    <p id="errorMessage" class="error-message">An error occurred</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
