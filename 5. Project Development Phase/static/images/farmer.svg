<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Sky -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B7500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background sky -->
  <rect width="1200" height="300" fill="url(#skyGradient)"/>
  
  <!-- Wheat field -->
  <rect y="300" width="1200" height="300" fill="url(#fieldGradient)"/>
  
  <!-- Sun -->
  <circle cx="1100" cy="80" r="40" fill="#FFD700" opacity="0.8"/>
  
  <!-- Wheat stalks in background (left) -->
  <line x1="100" y1="300" x2="90" y2="250" stroke="#DAA520" stroke-width="3"/>
  <line x1="120" y1="300" x2="115" y2="240" stroke="#DAA520" stroke-width="3"/>
  <line x1="140" y1="300" x2="135" y2="260" stroke="#DAA520" stroke-width="3"/>
  
  <!-- Farmer body -->
  <ellipse cx="600" cy="250" rx="30" ry="45" fill="#8B7355"/>
  
  <!-- Farmer head -->
  <circle cx="600" cy="180" r="25" fill="#D4A574"/>
  
  <!-- Farmer turban/head cloth -->
  <ellipse cx="600" cy="170" rx="28" ry="20" fill="#C17D4D"/>
  
  <!-- Farmer face -->
  <circle cx="595" cy="185" r="4" fill="#333"/>
  <circle cx="605" cy="185" r="4" fill="#333"/>
  <line x1="600" y1="195" x2="600" y2="205" stroke="#333" stroke-width="2"/>
  
  <!-- Farmer arms -->
  <line x1="570" y1="270" x2="520" y2="300" stroke="#D4A574" stroke-width="8"/>
  <line x1="630" y1="270" x2="720" y2="240" stroke="#D4A574" stroke-width="8"/>
  
  <!-- Scythe/Sickle handle -->
  <line x1="720" y1="240" x2="750" y2="180" stroke="#8B4513" stroke-width="6"/>
  
  <!-- Scythe blade -->
  <path d="M 750 180 Q 780 160 800 200" stroke="#696969" stroke-width="5" fill="none"/>
  
  <!-- Farmer legs -->
  <line x1="585" y1="295" x2="570" y2="380" stroke="#333" stroke-width="8"/>
  <line x1="615" y1="295" x2="630" y2="380" stroke="#333" stroke-width="8"/>
  
  <!-- Farmer feet -->
  <ellipse cx="570" cy="385" rx="8" ry="12" fill="#333"/>
  <ellipse cx="630" cy="385" rx="8" ry="12" fill="#333"/>
  
  <!-- Wheat stalks in front (right) -->
  <line x1="950" y1="300" x2="940" y2="240" stroke="#DAA520" stroke-width="3"/>
  <line x1="980" y1="300" x2="975" y2="250" stroke="#DAA520" stroke-width="3"/>
  <line x1="1050" y1="300" x2="1060" y2="250" stroke="#DAA520" stroke-width="3"/>
  
  <!-- Wheat details -->
  <text x="50" y="550" font-size="16" fill="#333" opacity="0.6">Agricultural Excellence Through Data-Driven Insights</text>
</svg>